name: Installer static checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  windows:
    name: Windows installer checks
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
      - name: Verify Windows package
        shell: powershell
        run: .\tests\verify-windows-package.ps1
      - name: Verify all installers
        shell: powershell
        run: .\tests\verify-all-installers.ps1

  macos:
    name: macOS shell checks
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Check shell syntax
        shell: bash
        run: |
          set -euo pipefail
          find installers -name '*.sh' -print0 | while IFS= read -r -d '' file; do
            bash -n "$file"
          done
      - name: Check for obvious secrets
        shell: bash
        run: |
          set -euo pipefail
          if grep -RIE 'sk-[A-Za-z0-9_-]{12,}|Bearer[[:space:]]+sk-' installers shared docs tests; then
            echo "Possible secret found"
            exit 1
          fi

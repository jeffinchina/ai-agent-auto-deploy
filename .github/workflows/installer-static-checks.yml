name: Installer static checks

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      macos_smoke_agent:
        description: "Optional real macOS smoke target. Default keeps the workflow static/dry-run only."
        required: true
        default: "none"
        type: choice
        options:
          - none
          - claude-code
          - codex
          - openclaw
          - cursor
      windows_smoke_agent:
        description: "Optional real Windows smoke target. Default keeps the workflow static/dry-run only."
        required: true
        default: "none"
        type: choice
        options:
          - none
          - codex
          - openclaw
          - cursor
      deepseek_smoke:
        description: "Run the selected agent's DeepSeek provider/conversation smoke when implemented. Requires DEEPSEEK_API_KEY secret."
        required: true
        default: false
        type: boolean

jobs:
  windows:
    name: Windows installer checks
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
      - name: Verify all installers
        shell: powershell
        run: .\tests\verify-all-installers.ps1

  macos:
    name: macOS shell checks
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Check shell syntax
        shell: bash
        run: |
          set -euo pipefail
          find installers -name '*.sh' -print0 | while IFS= read -r -d '' file; do
            bash -n "$file"
          done
      - name: Run shell dry-runs
        shell: bash
        run: |
          set -euo pipefail
          find installers/macos -name 'install.sh' -print0 | while IFS= read -r -d '' file; do
            DRY_RUN=1 bash "$file"
          done
      - name: Check for obvious secrets
        shell: bash
        run: |
          set -euo pipefail
          if grep -RIE 'sk-[A-Za-z0-9_-]{12,}|Bearer[[:space:]]+sk-' installers shared docs tests tools config; then
            echo "Possible secret found"
            exit 1
          fi

  macos-smoke:
    name: Manual macOS smoke
    if: github.event_name == 'workflow_dispatch' && inputs.macos_smoke_agent != 'none'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Run selected macOS smoke
        shell: bash
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          AGENT: ${{ inputs.macos_smoke_agent }}
          DEEPSEEK_SMOKE: ${{ inputs.deepseek_smoke }}
        run: |
          set -euo pipefail
          case "$AGENT" in
            claude-code)
              if [ -z "${DEEPSEEK_API_KEY:-}" ]; then
                echo "DEEPSEEK_API_KEY repository secret is required for Claude Code macOS smoke."
                exit 1
              fi
              bash installers/macos/claude-code/install.sh
              ;;
            codex)
              if [ "${DEEPSEEK_SMOKE}" = "true" ]; then
                if [ -z "${DEEPSEEK_API_KEY:-}" ]; then
                  echo "DEEPSEEK_API_KEY repository secret is required for Codex macOS DeepSeek smoke."
                  exit 1
                fi
                PREPARE_DEEPSEEK_LITELLM=1 INSTALL_LITELLM_PROXY=1 RUN_DEEPSEEK_SMOKE=1 bash installers/macos/codex/install.sh
              else
                bash installers/macos/codex/install.sh
              fi
              ;;
            openclaw)
              if [ "${DEEPSEEK_SMOKE}" = "true" ]; then
                if [ -z "${DEEPSEEK_API_KEY:-}" ]; then
                  echo "DEEPSEEK_API_KEY repository secret is required for OpenClaw macOS DeepSeek smoke."
                  exit 1
                fi
                CONFIGURE_DEEPSEEK=1 RUN_DEEPSEEK_SMOKE=1 bash installers/macos/openclaw/install.sh
              else
                bash installers/macos/openclaw/install.sh
              fi
              ;;
            cursor)
              if [ "${DEEPSEEK_SMOKE}" = "true" ]; then
                echo "Cursor DeepSeek smoke is a GUI/manual gate and is not implemented in macOS workflow yet."
                exit 1
              fi
              bash installers/macos/cursor/install.sh
              ;;
            *)
              echo "Unsupported smoke agent: $AGENT"
              exit 1
              ;;
          esac
      - name: Collect macOS smoke logs
        if: always()
        shell: bash
        env:
          AGENT: ${{ inputs.macos_smoke_agent }}
        run: |
          set -euo pipefail
          mkdir -p smoke-artifacts
          {
            echo "# macOS smoke summary"
            echo
            echo "- Agent: ${AGENT}"
            echo "- Run: ${GITHUB_RUN_ID}"
            echo "- Commit: ${GITHUB_SHA}"
            echo "- Runner: $(uname -a)"
            echo "- Date UTC: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > smoke-artifacts/SUMMARY.md
          find installers/macos -path '*/logs/*' -type f -print0 | while IFS= read -r -d '' file; do
            dest="smoke-artifacts/${file#installers/macos/}"
            mkdir -p "$(dirname "$dest")"
            cp "$file" "$dest"
          done
      - name: Upload macOS smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-smoke-${{ inputs.macos_smoke_agent }}-${{ github.run_id }}
          path: smoke-artifacts
          if-no-files-found: warn

  windows-smoke:
    name: Manual Windows smoke
    if: github.event_name == 'workflow_dispatch' && inputs.windows_smoke_agent != 'none'
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
      - name: Run selected Windows smoke
        shell: powershell
        env:
          AGENT: ${{ inputs.windows_smoke_agent }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_SMOKE: ${{ inputs.deepseek_smoke }}
        run: |
          $ErrorActionPreference = "Stop"
          switch ($env:AGENT) {
            "codex" {
              if ($env:DEEPSEEK_SMOKE -eq "true") {
                throw "Codex DeepSeek smoke requires a Responses-compatible bridge and is not implemented in Windows workflow yet."
              }
              powershell -NoProfile -ExecutionPolicy Bypass -File .\installers\windows\codex\install.ps1 -SkipLoginHint
              break
            }
            "openclaw" {
              if ($env:DEEPSEEK_SMOKE -eq "true") {
                if (-not $env:DEEPSEEK_API_KEY) {
                  throw "DEEPSEEK_API_KEY repository secret is required for OpenClaw Windows DeepSeek smoke."
                }
                powershell -NoProfile -ExecutionPolicy Bypass -File .\installers\windows\openclaw\install.ps1 -ConfigureDeepSeek -RunDeepSeekSmoke
              } else {
                powershell -NoProfile -ExecutionPolicy Bypass -File .\installers\windows\openclaw\install.ps1
              }
              break
            }
            "cursor" {
              if ($env:DEEPSEEK_SMOKE -eq "true") {
                throw "Cursor DeepSeek smoke is a GUI/manual gate and is not implemented in Windows workflow yet."
              }
              powershell -NoProfile -ExecutionPolicy Bypass -File .\installers\windows\cursor\install.ps1 -InstallDesktop
              break
            }
            default {
              throw "Unsupported smoke agent: $env:AGENT"
            }
          }
      - name: Collect Windows smoke logs
        if: always()
        shell: powershell
        env:
          AGENT: ${{ inputs.windows_smoke_agent }}
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Path smoke-artifacts -Force | Out-Null
          $summary = @(
            "# Windows smoke summary",
            "",
            "- Agent: $env:AGENT",
            "- Run: $env:GITHUB_RUN_ID",
            "- Commit: $env:GITHUB_SHA",
            "- Runner: $([System.Environment]::OSVersion.VersionString)",
            "- Date UTC: $((Get-Date).ToUniversalTime().ToString('yyyy-MM-ddTHH:mm:ssZ'))"
          )
          Set-Content -LiteralPath smoke-artifacts\SUMMARY.md -Value $summary -Encoding UTF8
          Get-ChildItem -Path installers\windows -Recurse -File -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match '\\logs\\' } |
            ForEach-Object {
              $relative = $_.FullName.Substring((Resolve-Path "installers\windows").Path.Length + 1)
              $dest = Join-Path smoke-artifacts $relative
              New-Item -ItemType Directory -Path (Split-Path -Parent $dest) -Force | Out-Null
              Copy-Item -LiteralPath $_.FullName -Destination $dest -Force
            }
      - name: Upload Windows smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-smoke-${{ inputs.windows_smoke_agent }}-${{ github.run_id }}
          path: smoke-artifacts
          if-no-files-found: warn
